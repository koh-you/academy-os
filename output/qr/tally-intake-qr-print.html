<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>신규 상담/등록 접수 QR</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        background: #ffffff;
        color: #111827;
        font-family: Arial, "Malgun Gothic", sans-serif;
      }

      main {
        width: min(92vw, 760px);
        text-align: center;
        padding: 48px 32px;
      }

      h1 {
        margin: 0 0 18px;
        font-size: 42px;
        line-height: 1.2;
      }

      p {
        margin: 0 0 28px;
        font-size: 24px;
        line-height: 1.45;
      }

      img {
        width: min(72vw, 420px);
        height: auto;
        image-rendering: pixelated;
      }

      .url {
        margin-top: 24px;
        font-size: 18px;
        color: #374151;
        word-break: break-all;
      }

      @media print {
        body {
          min-height: auto;
        }

        main {
          width: 100%;
          padding: 32px 24px;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>신규 상담/등록 접수</h1>
      <p>휴대폰 카메라로 QR을 찍고 학생 정보를 입력해주세요.</p>
      <img src="./tally-intake-qr.png" alt="Tally 신규 상담 등록 접수 QR" />
      <div class="url">https://tally.so/r/dWNk2A</div>
    </main>
  </body>
</html>
