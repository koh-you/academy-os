services:
  - type: web
    name: koh-you-math-academy-os-api
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm run api
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production
      - key: ALIMTALK_DRY_RUN
        value: "false"
      - key: ALIMTALK_ALLOW_REAL_STUDENT_NUMBERS
        value: "true"
      - key: ALIMTALK_ALLOW_REAL_PARENT_NUMBERS
        value: "true"
      - key: ALIMTALK_TEST_RECIPIENT
        value: "01057882748"
      - key: CORS_ALLOWED_ORIGINS
        value: "*"
  - type: cron
    name: koh-you-math-academy-os-notification-dispatch
    env: node
    schedule: "*/5 * * * *"
    buildCommand: npm install
    startCommand: npm run dispatch:notifications
    envVars:
      - key: ACADEMY_API_URL
        value: https://koh-you-math-academy-os-api.onrender.com
      - key: ALIMTALK_DRY_RUN
        value: "false"
      - key: NOTIFICATION_DISPATCH_LIMIT
        value: "50"
  - type: cron
    name: koh-you-math-academy-os-slack-daily-schedule
    env: node
    schedule: "0 1 * * *"
    buildCommand: npm install
    startCommand: npm run slack:daily-schedule
    envVars:
      - key: ACADEMY_API_URL
        value: https://koh-you-math-academy-os-api.onrender.com
