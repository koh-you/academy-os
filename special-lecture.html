<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>으뜸수학 고태영T 특강 안내</title>
    <meta property="og:title" content="으뜸수학 고태영T 특강 안내" />
    <meta name="twitter:title" content="으뜸수학 고태영T 특강 안내" />
    <style>
      :root {
        color: #0f172a;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        overflow-wrap: break-word;
        word-break: keep-all;
      }

      * {
        box-sizing: border-box;
      }

      body {
        background: #edf5ff;
        margin: 0;
        min-width: 320px;
      }

      .page {
        margin: 0 auto;
        max-width: 760px;
        padding: 18px;
      }

      .guide {
        background: #ffffff;
        border: 1px solid #cfe0f7;
        border-radius: 8px;
        box-shadow: 0 16px 44px rgba(15, 23, 42, 0.12);
        overflow: hidden;
      }

      .hero {
        background: #1d4ed8;
        color: #ffffff;
        padding: 28px 22px;
      }

      .hero p,
      .hero h1 {
        margin: 0;
      }

      .hero p {
        font-size: 13px;
        font-weight: 800;
        opacity: 0.9;
      }

      .hero h1 {
        font-size: 26px;
        line-height: 1.25;
        margin-top: 8px;
      }

      .hero span {
        display: block;
        font-size: 15px;
        font-weight: 700;
        line-height: 1.5;
        margin-top: 12px;
      }

      .facts {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      .fact {
        border-bottom: 1px solid #dbe7f5;
        min-height: 76px;
        padding: 14px;
      }

      .fact:nth-child(odd) {
        border-right: 1px solid #dbe7f5;
      }

      .fact span {
        color: #64748b;
        display: block;
        font-size: 12px;
        font-weight: 800;
      }

      .fact strong {
        display: block;
        font-size: 16px;
        line-height: 1.4;
        margin-top: 6px;
      }

      .section {
        border-top: 1px solid #dbe7f5;
        padding: 22px;
      }

      .section:first-of-type {
        border-top: 0;
      }

      .eyebrow {
        color: #2563eb;
        font-size: 12px;
        font-weight: 900;
        letter-spacing: 0;
        margin: 0 0 6px;
      }

      h2 {
        font-size: 22px;
        line-height: 1.3;
        margin: 0 0 14px;
      }

      .summary {
        color: #334155;
        font-size: 16px;
        line-height: 1.7;
        margin: 0 0 14px;
      }

      .cards {
        display: grid;
        gap: 10px;
        list-style: none;
        margin: 0;
        padding: 0;
      }

      .cards li,
      .note {
        border-radius: 8px;
        font-size: 15px;
        font-weight: 800;
        line-height: 1.55;
        padding: 13px 14px;
      }

      .cards li {
        background: #eff6ff;
        border: 1px solid #bfdbfe;
        color: #1e3a8a;
      }

      .note {
        background: #fffbeb;
        border: 1px solid #fcd34d;
        color: #78350f;
        margin-top: 14px;
        white-space: pre-line;
      }

      .note span {
        display: block;
        font-size: 12px;
        margin-bottom: 6px;
      }

      .timeline {
        display: grid;
        gap: 10px;
      }

      .session {
        align-items: stretch;
        display: grid;
        grid-template-columns: 36px 1fr;
        gap: 10px;
      }

      .sessionNumber {
        align-items: center;
        background: #1d4ed8;
        border-radius: 999px;
        color: #ffffff;
        display: flex;
        font-size: 14px;
        font-weight: 900;
        height: 36px;
        justify-content: center;
        width: 36px;
      }

      .sessionBody {
        border: 1px solid #cfe0f7;
        border-radius: 8px;
        padding: 13px 14px;
      }

      .sessionBody strong,
      .sessionBody small,
      .sessionBody span {
        display: block;
      }

      .sessionBody strong {
        font-size: 15px;
      }

      .sessionBody small {
        color: #2563eb;
        font-weight: 800;
        margin-top: 4px;
      }

      .sessionBody span {
        color: #334155;
        font-size: 14px;
        margin-top: 6px;
      }

      .footer {
        background: #f8fafc;
        border-top: 1px solid #dbe7f5;
        padding: 22px;
      }

      .teacher {
        margin: 0 0 14px;
      }

      .teacher span {
        color: #64748b;
        display: block;
        font-size: 12px;
        font-weight: 800;
      }

      .teacher strong {
        display: block;
        margin-top: 4px;
      }

      .footer p {
        color: #334155;
        line-height: 1.65;
        margin: 0 0 14px;
      }

      .apply {
        align-items: center;
        background: #0f3f91;
        border-radius: 8px;
        color: #ffffff;
        display: inline-flex;
        font-size: 16px;
        font-weight: 900;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        text-decoration: none;
      }

      .status {
        color: #475569;
        font-size: 14px;
        font-weight: 800;
        line-height: 1.6;
        margin: 14px 0 0;
        text-align: center;
      }

      @media (max-width: 520px) {
        .page {
          padding: 0;
        }

        .guide {
          border-left: 0;
          border-radius: 0;
          border-right: 0;
          box-shadow: none;
        }

        .facts {
          grid-template-columns: 1fr;
        }

        .fact:nth-child(odd) {
          border-right: 0;
        }

        .hero,
        .section,
        .footer {
          padding-left: 18px;
          padding-right: 18px;
        }

        .hero h1 {
          font-size: 23px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <article class="guide" id="guide">
        <section class="hero">
          <p>으뜸수학 고태영T</p>
          <h1>특강 안내문을 불러오는 중입니다.</h1>
          <span>잠시만 기다려 주세요.</span>
        </section>
      </article>
      <p class="status" id="status">저장된 안내문을 확인하고 있습니다.</p>
      <noscript>
        <p class="status">브라우저에서 JavaScript를 허용한 뒤 다시 열어 주세요.</p>
      </noscript>
    </main>
    <script>
      (function () {
        var academyName = "으뜸수학 고태영T";
        var apiBase = location.hostname === "127.0.0.1" || location.hostname === "localhost"
          ? "http://127.0.0.1:8787"
          : "https://koh-you-math-academy-os-api.onrender.com";
        var fallbackGuides = [{
          slug: "2026-summer-high1-clinic-mwf",
          specialLectureGuideId: "special_lecture_2026_summer_high1_clinic_mwf",
          year: "2026",
          season: "summer",
          title: "2026 여름 개별 진도 클리닉",
          audience: "예비고1",
          goal: "개별 진도와 취약 단원을 학생별로 점검합니다.",
          specialNotes: "",
          days: "월·수·금",
          time: "13:00-16:00",
          lessonCount: "총 8회 · 24시간",
          tuition: "300,000원",
          teacher: "고태영T",
          textbook: "개별 선정",
          summary: "방학 동안 각 학생의 현재 진도를 기준으로 빈틈을 정리하고, 다음 학기 수업을 따라갈 수 있는 계산력과 개념 연결을 점검합니다.",
          highlights: ["학생별 현재 진도와 취약 단원을 기준으로 개별 수업 합니다."],
          sessions: [
            { date: "7월 22일", day: "수", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" },
            { date: "7월 24일", day: "금", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" },
            { date: "7월 27일", day: "월", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" },
            { date: "7월 29일", day: "수", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" },
            { date: "7월 31일", day: "금", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" },
            { date: "8월 3일", day: "월", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" },
            { date: "8월 5일", day: "수", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" },
            { date: "8월 7일", day: "금", startTime: "13:00", endTime: "16:00", topic: "개별 클리닉" }
          ],
          applicationUrl: "https://tally.so/r/eql9aJ"
        }];

        function text(value, fallback) {
          var result = value === null || value === undefined ? "" : String(value);
          result = result.replace(/^\s+|\s+$/g, "");
          return result || fallback || "";
        }

        function getParam(name) {
          var query = location.search ? location.search.substring(1) : "";
          var hash = location.hash || "";
          if (hash.indexOf("?") >= 0) query += (query ? "&" : "") + hash.split("?")[1];
          var pairs = query.split("&");
          for (var i = 0; i < pairs.length; i += 1) {
            var parts = pairs[i].split("=");
            if (decodeURIComponent(parts[0] || "") === name) {
              return decodeURIComponent((parts[1] || "").replace(/\+/g, " "));
            }
          }
          return "";
        }

        function slugOf(guide) {
          return text(guide.slug || guide.specialLectureGuideId || guide.special_lecture_guide_id);
        }

        function seasonLabel(value) {
          return value === "winter" ? "겨울" : value === "spring" ? "봄" : value === "fall" ? "가을" : "여름";
        }

        function appendParams(url, params) {
          var raw = text(url);
          if (!raw) return "";
          var pieces = [];
          for (var key in params) {
            if (Object.prototype.hasOwnProperty.call(params, key) && text(params[key])) {
              pieces.push(encodeURIComponent(key) + "=" + encodeURIComponent(text(params[key])));
            }
          }
          if (!pieces.length) return raw;
          return raw + (raw.indexOf("?") >= 0 ? "&" : "?") + pieces.join("&");
        }

        function applicationUrl(guide) {
          return appendParams(text(guide.applicationUrl || guide.application_url, "https://tally.so/r/eql9aJ"), {
            specialLectureId: text(guide.specialLectureGuideId || guide.special_lecture_guide_id),
            guideId: slugOf(guide),
            source: "os_guide",
            campaign: [text(guide.year), text(guide.season), text(guide.title)].join("_").replace(/\s+/g, "_")
          });
        }

        function addText(parent, tag, value, className) {
          if (!text(value)) return null;
          var element = document.createElement(tag);
          if (className) element.className = className;
          element.textContent = text(value);
          parent.appendChild(element);
          return element;
        }

        function renderFact(parent, label, value) {
          if (!text(value)) return;
          var item = document.createElement("div");
          item.className = "fact";
          addText(item, "span", label);
          addText(item, "strong", value);
          parent.appendChild(item);
        }

        function renderGuide(guide, sourceLabel) {
          var container = document.getElementById("guide");
          var status = document.getElementById("status");
          var sessions = guide.sessions && guide.sessions.length ? guide.sessions : [];
          var highlights = guide.highlights && guide.highlights.length ? guide.highlights : [];
          var notes = text(guide.specialNotes || guide.special_notes);
          container.innerHTML = "";

          var hero = document.createElement("header");
          hero.className = "hero";
          addText(hero, "p", academyName);
          addText(hero, "h1", text(guide.title, "특강 안내"));
          addText(hero, "span", text(guide.goal || guide.summary, "자세한 수업 구성과 회차별 일정을 확인해 주세요."));
          container.appendChild(hero);

          var facts = document.createElement("section");
          facts.className = "facts";
          renderFact(facts, "대상", guide.audience);
          renderFact(facts, "요일", guide.days);
          renderFact(facts, "시간", guide.time);
          renderFact(facts, "시수", guide.lessonCount || guide.lesson_count);
          renderFact(facts, "교재", guide.textbook);
          renderFact(facts, "수강료", guide.tuition);
          container.appendChild(facts);

          var overview = document.createElement("section");
          overview.className = "section";
          addText(overview, "p", "OVERVIEW", "eyebrow");
          addText(overview, "h2", "수업 방향");
          addText(overview, "p", guide.summary, "summary");
          if (highlights.length) {
            var list = document.createElement("ul");
            list.className = "cards";
            for (var i = 0; i < highlights.length; i += 1) {
              addText(list, "li", highlights[i]);
            }
            overview.appendChild(list);
          }
          if (notes) {
            var note = document.createElement("div");
            note.className = "note";
            addText(note, "span", "특이사항");
            addText(note, "div", notes);
            overview.appendChild(note);
          }
          container.appendChild(overview);

          if (sessions.length) {
            var schedule = document.createElement("section");
            schedule.className = "section";
            addText(schedule, "p", "SCHEDULE", "eyebrow");
            addText(schedule, "h2", "회차별 계획");
            var timeline = document.createElement("div");
            timeline.className = "timeline";
            for (var j = 0; j < sessions.length; j += 1) {
              var session = sessions[j] || {};
              var row = document.createElement("div");
              row.className = "session";
              addText(row, "span", String(j + 1), "sessionNumber");
              var body = document.createElement("div");
              body.className = "sessionBody";
              addText(body, "strong", [text(session.date), text(session.day) ? "(" + text(session.day) + ")" : ""].join(" "));
              addText(body, "small", [text(session.startTime || session.start_time), text(session.endTime || session.end_time)].filter(function (item) { return item; }).join("-"));
              addText(body, "span", session.topic || session.content || "특강 수업");
              row.appendChild(body);
              timeline.appendChild(row);
            }
            schedule.appendChild(timeline);
            container.appendChild(schedule);
          }

          var footer = document.createElement("footer");
          footer.className = "footer";
          var teacher = document.createElement("p");
          teacher.className = "teacher";
          addText(teacher, "span", "담당");
          addText(teacher, "strong", guide.teacher || "고태영T");
          footer.appendChild(teacher);
          addText(footer, "p", "신청은 아래 버튼으로 접수하고, 세부 문의는 학원으로 회신해 주세요.");
          var apply = document.createElement("a");
          apply.className = "apply";
          apply.href = applicationUrl(guide);
          apply.target = "_blank";
          apply.rel = "noreferrer";
          apply.textContent = "특강 신청하기";
          footer.appendChild(apply);
          container.appendChild(footer);

          document.title = text(guide.title, "특강 안내") + " - " + academyName;
          status.textContent = sourceLabel === "fallback" ? "저장본을 불러오지 못해 기본 안내문을 표시하고 있습니다." : "";
        }

        function chooseGuide(guides) {
          var requested = getParam("guide");
          if (requested) {
            for (var i = 0; i < guides.length; i += 1) {
              if (slugOf(guides[i]) === requested) return guides[i];
            }
          }
          return guides[0] || fallbackGuides[0];
        }

        function loadGuides() {
          var request = new XMLHttpRequest();
          request.open("GET", apiBase + "/api/special-lecture-guides", true);
          request.onreadystatechange = function () {
            if (request.readyState !== 4) return;
            if (request.status >= 200 && request.status < 300) {
              try {
                var result = JSON.parse(request.responseText || "{}");
                if (result.ok && result.specialLectureGuides && result.specialLectureGuides.length) {
                  renderGuide(chooseGuide(result.specialLectureGuides), "remote");
                  return;
                }
              } catch (error) {
                // Fall through to the static guide.
              }
            }
            renderGuide(chooseGuide(fallbackGuides), "fallback");
          };
          request.onerror = function () {
            renderGuide(chooseGuide(fallbackGuides), "fallback");
          };
          try {
            request.send();
          } catch (error) {
            renderGuide(chooseGuide(fallbackGuides), "fallback");
          }
        }

        renderGuide(chooseGuide(fallbackGuides), "loading");
        loadGuides();
      })();
    </script>
  </body>
</html>
